<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpreadScope — Live Funding Arbitrage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #0A0C10;
    --panel: rgba(18,22,28,0.72);
    --panel-border: rgba(182,255,59,0.15);
    --accent: #B6FF3B;
    --accent-dim: rgba(182,255,59,0.35);
    --neg: #FF4D6D;
    --neg-dim: rgba(255,77,109,0.35);
    --text: #E9EDF0;
    --muted: #8B96A3;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    width:100%; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  .scene{
    position:fixed; inset:0;
    background: radial-gradient(ellipse at 50% 0%, #151b22 0%, #0A0C10 60%);
    overflow:hidden;
  }

  .sky-glow{
    position:absolute; top:-20%; left:50%; transform:translateX(-50%);
    width:140%; height:60%;
    background: radial-gradient(ellipse at center, rgba(182,255,59,0.06) 0%, transparent 70%);
    pointer-events:none;
  }

  .skyline{
    position:absolute; bottom:0; left:0; width:100%; height:70%;
    display:flex; align-items:flex-end; justify-content:center;
    gap: 6px;
    filter: drop-shadow(0 0 40px rgba(0,0,0,0.6));
  }

  .bldg{
    background: linear-gradient(180deg, #1B2129 0%, #12161B 100%);
    border-top: 1px solid rgba(255,255,255,0.06);
    position:relative;
    flex-shrink:0;
  }
  .bldg::after{
    content:''; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 14px, rgba(182,255,59,0.05) 14px, rgba(182,255,59,0.05) 15px);
  }
  .bldg .win{
    position:absolute; width:4px; height:4px; background: rgba(182,255,59,0.5);
    box-shadow: 0 0 4px rgba(182,255,59,0.6);
    animation: flicker 4s infinite ease-in-out;
  }
  @keyframes flicker{
    0%, 100%{ opacity:0.15; }
    50%{ opacity:0.85; }
  }

  .road{
    position:absolute; bottom:0; left:0; width:100%; height:14%;
    background: linear-gradient(180deg, #14171C 0%, #0D0F13 100%);
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .road::before{
    content:''; position:absolute; top:50%; left:0; width:100%; height:2px;
    background: repeating-linear-gradient(90deg, rgba(182,255,59,0.35) 0 24px, transparent 24px 48px);
    transform: translateY(-50%);
  }

  .candle-track{
    position:absolute; bottom:2%; left:0; width:100%; height:12%;
  }
  .candle{
    position:absolute; bottom:0;
    width:10px; height:26px;
    animation: drive linear infinite, beat 1.1s ease-in-out infinite;
  }
  .candle .wick{
    position:absolute; left:50%; top:0; width:2px; height:100%;
    background: currentColor; transform:translateX(-50%);
    opacity:0.9;
  }
  .candle .body{
    position:absolute; left:0; top:30%; width:100%; height:40%;
    background: currentColor; border-radius:1px;
    box-shadow: 0 0 8px currentColor;
  }
  .candle.up{ color: var(--accent); }
  .candle.down{ color: var(--neg); }

  @keyframes beat{
    0%, 100%{ transform: scaleY(1); }
    15%{ transform: scaleY(1.35); }
    30%{ transform: scaleY(0.9); }
    45%{ transform: scaleY(1.2); }
    60%{ transform: scaleY(1); }
  }
  @keyframes drive{
    from{ left: -5%; }
    to{ left: 105%; }
  }

  .panel{
    position:fixed;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    padding: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .panel-title{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display:flex; align-items:center; gap:8px;
  }
  .dot-live{
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: beat 1.1s ease-in-out infinite;
  }

  .funding-panel{
    top: 20px; left: 20px;
    width: 340px;
    max-height: 82vh;
    overflow-y: auto;
  }

  .row{
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .row:last-child{ border-bottom:none; }

  .row-top{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 6px;
  }
  .symbol{ font-family: var(--mono); font-weight:600; font-size:14px; }
  .spread-val{ font-family: var(--mono); font-size:13px; }
  .spread-val.hot{ color: var(--accent); font-weight:700; }
  .spread-val.cold{ color: var(--muted); }

  .rates{
    display:flex; justify-content:space-between;
    font-family: var(--mono); font-size:11px; color: var(--muted);
    margin-bottom: 6px;
  }

  .bar-track{
    position:relative; height:4px; border-radius:2px;
    background: rgba(255,255,255,0.06);
  }
  .bar-fill{
    position:absolute; top:0; height:100%; border-radius:2px;
    background: linear-gradient(90deg, var(--accent), var(--neg));
    opacity:0.5;
  }
  .bar-dot{
    position:absolute; top:50%; width:8px; height:8px; border-radius:50%;
    transform: translate(-50%,-50%);
    box-shadow: 0 0 6px currentColor;
  }
  .bar-dot.b{ color: #5CC8FF; background: #5CC8FF; }
  .bar-dot.y{ color: #FFB84D; background: #FFB84D; }

  .legend{
    display:flex; gap:14px; margin-top:10px; font-family: var(--mono); font-size:10px; color: var(--muted);
  }
  .legend span{ display:flex; align-items:center; gap:5px; }
  .swatch{ width:7px; height:7px; border-radius:50%; }

  .fee-note{
    margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06);
    font-family: var(--mono); font-size: 10px; color: var(--muted); line-height:1.5;
  }

  .action-panel{
    top: 20px; right: 20px;
    width: 220px;
  }

  .action-btn{
    width:100%;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: var(--sans);
    font-weight:600;
    font-size: 13px;
    text-align:left;
    cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
    transition: all 0.15s ease;
  }
  .action-btn:hover{
    background: rgba(255,255,255,0.06);
    border-color: rgba(182,255,59,0.3);
  }
  .action-btn.primary{
    background: var(--accent);
    color: #0A0C10;
    border-color: var(--accent);
  }
  .action-btn.primary:hover{ filter: brightness(1.1); }
  .action-btn.danger{
    border-color: rgba(255,77,109,0.25);
  }
  .action-btn.danger:hover{
    background: rgba(255,77,109,0.1);
    border-color: var(--neg);
  }
  .action-btn .chev{ color: var(--muted); font-size:11px; }

  .status-pill{
    display:inline-flex; align-items:center; gap:6px;
    font-family: var(--mono); font-size:10px; color: var(--muted);
    padding: 6px 10px; border-radius:20px;
    background: rgba(255,255,255,0.03);
    margin-bottom: 12px;
  }
  .status-pill .dot{
    width:6px; height:6px; border-radius:50%; background: var(--muted);
  }

  .brand-strip{
    position:fixed; bottom:16px; left:20px;
    font-family: var(--mono); font-size:11px; color: var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .brand-strip .logo{
    width:20px; height:20px; border-radius:5px;
    background: var(--accent);
    display:flex; align-items:center; justify-content:center;
    color:#0A0C10; font-weight:700; font-size:11px;
  }

  .last-update{
    position:fixed; bottom:16px; right:20px;
    font-family: var(--mono); font-size:10px; color: var(--muted);
  }

  @media (max-width: 720px){
    .funding-panel{ width: calc(100% - 40px); max-height: 46vh; }
    .action-panel{ top: auto; bottom: 90px; right: 20px; width: calc(100% - 40px); }
    .action-btn{ display:inline-flex; width:auto; margin-right:8px; }
  }

  @media (prefers-reduced-motion: reduce){
    .candle, .dot-live, .bldg .win{ animation: none !important; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="sky-glow"></div>
  <div class="skyline" id="skyline"></div>
  <div class="road"></div>
  <div class="candle-track" id="candleTrack"></div>
</div>

<div class="panel funding-panel">
  <div class="panel-title"><span class="dot-live"></span> Live Funding Spread</div>
  <div id="rows">
    <div class="row"><div class="rates">Loading…</div></div>
  </div>
  <div class="fee-note" id="feeNote">Fee floor per round trip: ~0.100% (rough estimate) — spread must clear this to be worth trading.</div>
</div>

<div class="panel action-panel">
  <div class="panel-title">Controls</div>
  <div class="status-pill"><span class="dot"></span> Exchange: Not Connected</div>
  <button class="action-btn primary" onclick="showStub('Open Trade')">Open Trade <span class="chev">›</span></button>
  <button class="action-btn danger" onclick="showStub('Close Trade')">Close Trade <span class="chev">›</span></button>
  <button class="action-btn" onclick="showStub('Alerts')">Alerts <span class="chev">›</span></button>
  <button class="action-btn" onclick="showStub('Settings')">Settings <span class="chev">›</span></button>
</div>

<div class="brand-strip"><span class="logo">S</span> SpreadScope</div>
<div class="last-update" id="lastUpdate">—</div>

<script>
const SYMBOLS = ["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","DOGEUSDT"];
const MIN_SPREAD_PCT = 0.05;
const REFRESH_MS = 60000;
const API_ENDPOINT = '/api/rates';

const skyline = document.getElementById('skyline');
const buildingCount = 22;
for(let i=0;i<buildingCount;i++){
  const b = document.createElement('div');
  b.className = 'bldg';
  const h = 30 + Math.random()*65;
  const w = 24 + Math.random()*30;
  b.style.height = h + '%';
  b.style.width = w + 'px';
  const winCount = Math.floor(h/8);
  for(let j=0;j<winCount;j++){
    const win = document.createElement('div');
    win.className = 'win';
    win.style.left = (Math.random()*(w-8)+4) + 'px';
    win.style.bottom = (j*12 + 6) + 'px';
    win.style.animationDelay = (Math.random()*4) + 's';
    b.appendChild(win);
  }
  skyline.appendChild(b);
}

const track = document.getElementById('candleTrack');
function spawnCandles(rates){
  track.innerHTML = '';
  SYMBOLS.forEach((sym, idx) => {
    const info = rates[sym];
    const dir = info && info.spread >= 0 ? (info.binance < info.bybit ? 'up' : 'down') : (idx % 2 === 0 ? 'up' : 'down');
    const c = document.createElement('div');
    c.className = 'candle ' + dir;
    const duration = 14 + Math.random()*10;
    const delay = -(Math.random()*duration);
    c.style.animationDuration = duration + 's, 1.1s';
    c.style.animationDelay = delay + 's, ' + (Math.random()*1.1) + 's';
    c.style.bottom = (Math.random()*60) + '%';
    c.innerHTML = '<div class="wick"></div><div class="body"></div>';
    track.appendChild(c);
  });
}
spawnCandles({});

const rowsEl = document.getElementById('rows');
const lastUpdateEl = document.getElementById('lastUpdate');

function renderRows(data){
  if(!data || !data.length){
    rowsEl.innerHTML = '<div class="row"><div class="rates">No data — check Worker /api/rates endpoint</div></div>';
    return;
  }
  rowsEl.innerHTML = '';
  data.forEach(item => {
    const hot = item.spread >= MIN_SPREAD_PCT;
    const row = document.createElement('div');
    row.className = 'row';

    const range = 0.6;
    const bPos = clampPct(item.binance, -range, range);
    const yPos = clampPct(item.bybit, -range, range);

    row.innerHTML = `
      <div class="row-top">
        <span class="symbol">${item.symbol.replace('USDT','')}</span>
        <span class="spread-val ${hot ? 'hot' : 'cold'}">${hot ? '● ' : ''}${item.spread.toFixed(4)}%</span>
      </div>
      <div class="rates">
        <span>OKX ${item.binance.toFixed(4)}%</span>
        <span>Bybit ${item.bybit.toFixed(4)}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-dot b" style="left:${bPos}%"></div>
        <div class="bar-dot y" style="left:${yPos}%"></div>
      </div>
    `;
    rowsEl.appendChild(row);
  });

  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.innerHTML = `
    <span><span class="swatch" style="background:#5CC8FF"></span> OKX</span>
    <span><span class="swatch" style="background:#FFB84D"></span> Bybit</span>
  `;
  rowsEl.appendChild(legend);
}

function clampPct(val, min, max){
  const pct = ((val - min) / (max - min)) * 100;
  return Math.min(96, Math.max(4, pct));
}

async function fetchRates(){
  try{
    const res = await fetch(API_ENDPOINT, { cache: 'no-store' });
    const json = await res.json();
    const data = json.data || [];
    const rateMap = {};
    data.forEach(d => rateMap[d.symbol] = d);
    renderRows(data);
    spawnCandles(rateMap);
    lastUpdateEl.textContent = 'Updated ' + new Date(json.timestamp || Date.now()).toLocaleTimeString();
  }catch(e){
    rowsEl.innerHTML = '<div class="row"><div class="rates">Fetch error — Worker not deployed yet or offline.</div></div>';
    lastUpdateEl.textContent = 'Error: ' + e.message;
  }
}

fetchRates();
setInterval(fetchRates, REFRESH_MS);

function showStub(action){
  alert(action + ': exchange connection not set up yet.\\n\\nThis will activate once API keys with trade permission are wired to the backend.');
}
</script>

</body>
</html>
